name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Workflow-level least-privilege default. The single job here
# only needs read access.
permissions:
  contents: read

jobs:
  test:
    name: Lint + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-extras --dev --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run --python ${{ matrix.python-version }} ruff check .

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest -q --cov=src/k8s_mcp --cov-report=term-missing