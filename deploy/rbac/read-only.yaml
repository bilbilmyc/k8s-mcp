# Read-only baseline for diagnostics. Change namespace/name before use.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-mcp-reader
  namespace: ops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-mcp-reader-view
subjects:
  - kind: ServiceAccount
    name: k8s-mcp-reader
    namespace: ops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
